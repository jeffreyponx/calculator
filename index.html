<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Простой калькулятор | GitHub Pages</title>
    <style>
        /* Импорт SF Pro Display (для macOS/iOS будет нативный, для остальных — запасной вариант) */
        @font-face {
            font-family: 'SF Pro Display';
            src: local('SF Pro Display Bold'), local('SFProDisplay-Bold');
            font-weight: bold;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'SF Pro Display';
            src: local('SF Pro Display Regular'), local('SFProDisplay-Regular');
            font-weight: normal;
            font-style: normal;
        }

        * {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #2b2b2b 0%, #1a1a1a 100%);
        }

        .calculator {
            background: #202020;
            border-radius: 30px;
            padding: 25px 20px 20px 20px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), inset 0 1px 3px rgba(255, 255, 255, 0.08);
            width: 320px;
            border: 1px solid #3a3a3a;
        }

        .display {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 15px 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 5px 8px #0f0f0f, 0 2px 3px #3f3f3f;
            border-bottom: 1px solid #4a4a4a;
        }

        #inputField {
            width: 100%;
            box-sizing: border-box;
            background: transparent;
            border: none;
            color: #f5f5f7;
            font-size: 32px;
            font-weight: bold;
            text-align: right;
            padding: 5px 0;
            outline: none;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        #inputField::placeholder {
            color: #5a5a5e;
            font-size: 24px;
            font-weight: bold;
        }

        #resultField {
            width: 100%;
            box-sizing: border-box;
            background: transparent;
            border: none;
            color: #ff9f0a;
            font-size: 22px;
            font-weight: bold;
            text-align: right;
            padding: 5px 0 0 0;
            min-height: 30px;
            letter-spacing: 0.5px;
            opacity: 0.9;
            border-top: 1px dashed #3a3a3c;
            margin-top: 8px;
            font-family: inherit;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            background: #333333;
            border: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 18px 5px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a1a1a, 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.08s ease;
            text-align: center;
            border: 1px solid #4a4a4a;
            user-select: none;
            line-height: 1;
            font-family: inherit;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a1a1a, 0 2px 6px rgba(0,0,0,0.3);
        }

        .num {
            background: #4a4a4d;
            border-color: #6b6b6e;
            color: #ffffff;
        }

        .operator {
            background: #ff9f0a;
            color: white;
            border-color: #ffb84d;
            box-shadow: 0 6px 0 #b36b00, 0 4px 8px rgba(0,0,0,0.3);
        }

        .equals {
            background: #ff9f0a;
            color: white;
            grid-column: span 1;
            border-color: #ffb84d;
            box-shadow: 0 6px 0 #b36b00, 0 4px 8px rgba(0,0,0,0.3);
        }

        .clear, .back {
            background: #a6a6a6;
            color: #1a1a1a;
            border-color: #c7c7c7;
            box-shadow: 0 6px 0 #6e6e6e, 0 4px 8px rgba(0,0,0,0.3);
        }

        .zero {
            grid-column: span 2;
        }

        button:focus-visible {
            outline: 2px solid #ff9f0a;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <input type="text" id="inputField" placeholder="0" readonly>
            <div id="resultField"></div>
        </div>
        <div class="buttons">
            <button class="clear" data-action="clear">C</button>
            <button class="back" data-action="backspace">⌫</button>
            <button class="operator" data-operator="%">%</button>
            <button class="operator" data-operator="/">÷</button>
            
            <button class="num" data-number="7">7</button>
            <button class="num" data-number="8">8</button>
            <button class="num" data-number="9">9</button>
            <button class="operator" data-operator="*">×</button>
            
            <button class="num" data-number="4">4</button>
            <button class="num" data-number="5">5</button>
            <button class="num" data-number="6">6</button>
            <button class="operator" data-operator="-">−</button>
            
            <button class="num" data-number="1">1</button>
            <button class="num" data-number="2">2</button>
            <button class="num" data-number="3">3</button>
            <button class="operator" data-operator="+">+</button>
            
            <button class="num zero" data-number="0">0</button>
            <button class="num" data-number=".">.</button>
            <button class="equals" data-action="equals">=</button>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            const inputField = document.getElementById('inputField');
            const resultField = document.getElementById('resultField');

            let currentExpression = '';
            let lastResult = '';
            let shouldReset = false;

            function updateDisplay() {
                inputField.value = currentExpression === '' ? '0' : currentExpression;
                resultField.textContent = lastResult !== '' ? `= ${lastResult}` : '';
            }

            function calculate(expr) {
                if (expr === '') return '';
                
                let calcExpr = expr
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-');
                
                if (calcExpr.includes('%')) {
                    calcExpr = calcExpr.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
                }

                try {
                    const result = Function('"use strict"; return (' + calcExpr + ')')();
                    
                    if (!isFinite(result)) {
                        return 'Ошибка';
                    }
                    
                    let rounded = parseFloat(result.toPrecision(12));
                    return String(rounded);
                } catch (e) {
                    return 'Ошибка';
                }
            }

            function appendToExpression(value) {
                if (shouldReset) {
                    if (!isOperator(value) && value !== '%') {
                        currentExpression = '';
                        lastResult = '';
                    }
                    shouldReset = false;
                }

                if (currentExpression === '' && isOperator(value) && value !== '−') {
                    if (value === '−') {
                        currentExpression = '−';
                    } else {
                        return;
                    }
                } else {
                    const lastChar = currentExpression.slice(-1);
                    if (isOperator(lastChar) && isOperator(value)) {
                        currentExpression = currentExpression.slice(0, -1) + value;
                    } else {
                        currentExpression += value;
                    }
                }

                if (currentExpression !== '') {
                    const res = calculate(currentExpression);
                    lastResult = (res === 'Ошибка') ? 'Ошибка' : res;
                } else {
                    lastResult = '';
                }

                updateDisplay();
            }

            function isOperator(char) {
                return char === '+' || char === '−' || char === '×' || char === '÷' || char === '%';
            }

            function handleEquals() {
                if (currentExpression === '') return;

                const finalResult = calculate(currentExpression);
                
                if (finalResult === 'Ошибка') {
                    currentExpression = '';
                    lastResult = 'Ошибка';
                } else {
                    currentExpression = finalResult;
                    lastResult = finalResult;
                }
                
                shouldReset = true;
                updateDisplay();
            }

            function handleClear() {
                currentExpression = '';
                lastResult = '';
                shouldReset = false;
                updateDisplay();
            }

            function handleBackspace() {
                if (shouldReset) {
                    currentExpression = '';
                    lastResult = '';
                    shouldReset = false;
                } else {
                    currentExpression = currentExpression.slice(0, -1);
                    if (currentExpression !== '') {
                        const res = calculate(currentExpression);
                        lastResult = (res === 'Ошибка') ? 'Ошибка' : res;
                    } else {
                        lastResult = '';
                    }
                }
                updateDisplay();
            }

            function handleButtonClick(e) {
                const button = e.currentTarget;
                
                const number = button.getAttribute('data-number');
                if (number !== null) {
                    appendToExpression(number);
                    return;
                }
                
                const operator = button.getAttribute('data-operator');
                if (operator !== null) {
                    let op = operator;
                    if (op === '*') op = '×';
                    if (op === '/') op = '÷';
                    if (op === '-') op = '−';
                    appendToExpression(op);
                    return;
                }
                
                const action = button.getAttribute('data-action');
                if (action === 'clear') {
                    handleClear();
                } else if (action === 'backspace') {
                    handleBackspace();
                } else if (action === 'equals') {
                    handleEquals();
                }
            }

            function init() {
                const buttons = document.querySelectorAll('button');
                buttons.forEach(btn => {
                    btn.addEventListener('click', handleButtonClick);
                });
                updateDisplay();
            }

            init();
        })();
    </script>
</body>
</html>
